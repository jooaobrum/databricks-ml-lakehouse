# Training Date 
training_params:
  start_training_date: '2017-02-01'
  end_training_date: '2018-06-01'

# Parameters for MLflow tracking
mlflow_params:
  
  # Name of the MLflow run
  run_name: 'DT 1st version '


# Parameters for the machine learning pipeline
pipeline_params:
    test_size: 0.3
    random_state: 42
    folds: 3
    orders_variables: ['item_price','freight_price', 'total_price', 'pct_item_price','pct_freight_price', 'late_order']
    
    customers_variables: ['total_spent_freight_180_days', 'total_orders_delivered_180_days', 'avg_days_to_deliver', 'total_spent_price_180_days', 'total_spent_freight_90_days']

    numeric_features: ['item_price', 'total_spent_freight_180_days', 'total_orders_delivered_180_days', 'avg_days_to_deliver',
                      'total_spent_price_180_days', 'freight_price', 'total_spent_freight_90_days', 'total_price', 'pct_item_price', 'pct_freight_price', 'late_order']
    
    categoric_features: []
    
  

# Parameters for the machine learning model
model_params:
    max_depth: 5
    min_samples_leaf: 4
    min_samples_split: 10
    class_weight: {0: 0.5742431523306103, 1: 3.867313915857605}
    random_state: 42

 