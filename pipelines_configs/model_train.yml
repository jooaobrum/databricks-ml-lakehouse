# Parameters for MLflow tracking
mlflow_params:
  
  # Name of the MLflow run
  run_name: 'DT with 8 features'





# Parameters for the machine learning pipeline
pipeline_params:
    test_size: 0.2
    random_state: 42
    folds: 3

    numeric_features: ['total_orders_delivered_90_days', 'total_orders_late_delivery', 'avg_days_to_deliver', 'total_spent_freight_90_days', 'total_spent_price_90_days', 'total_bed_bath_table_items_90_days', 'total_spent_price_180_days', 'total_spent_freight_180_days']
    
    categoric_features: []
    
  

# Parameters for the machine learning model
model_params:
    max_depth: 5
    min_samples_leaf: 4
    min_samples_split: 10
    class_weight: {0: 0.5742431523306103, 1: 3.867313915857605}
    random_state: 42

